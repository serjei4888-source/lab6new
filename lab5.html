    <script>
        //Задание 1
        function sumBeforeMin(arr) {
            if (arr.length === 0) {
                console.log("Массив пуст");
                return 0;
            }

            let minIndex = 0;
            for (let i = 1; i < arr.length; i++) {
                if (arr[i] < arr[minIndex]) {
                    minIndex = i;
                }
            }
            console.log(`Минимальный элемент: ${arr[minindex]} на позиции ${minIndex}`);

            let sum = 0;
            for (let i = 0; i < minIndex; i++) {
                sum += arr[i];
            }
            return sum;
        }
        //Задание 2
        function sumAbsAfterFirstZero(arr) {
            let zeroIndex = -1;
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] === 0) {
                    zeroIndex = i;
                    break;
                }
            }

            if (zeroIndex === -1) {
                console.log("В массиве нету нулевых элементов");
                return 0;
            }

            let sum = 0;
            for (let i = zeroIndex + 1; i < arr.length; i++) {
                sum += Math.abs(arr[i]);
            }
            return sum;
        }
        let example = [1, 2, 0, 5];
        let example2 = console.log(sumAbsAfterFirstZero(example));
        alert(example2);
        //Задание 3
        function sumAfterLastZero(arr) {
            let zeroIndex = -1;
            for (let i = arr.length - 1; i >= 0; i--) {
                if (arr[i] === 0) {
                    zeroIndex = i;
                    break;
                }
            }
            if (zeroIndex === -1) {
                console.log("В массиве нету нулевых элементов");
                return 0;
            }
            let sum = 0;
            for (let i = zeroIndex + 1; i < arr.length; i++) {
                sum += arr[i];
            }
            return sum;
        }
        let example3 = [1, 3, 4, 5]
        sumAbsAfterFirstZero(example3);
        console.log(sumAbsAfterFirstZero(example3));
        let example4 = [1, 3, 0, 5]
        console.log(sumAbsAfterFirstZero(example4));

        function Productlab5(arr) {
            let index = 1;
            for (let i = arr.length - 2; i > 0; i--) {
                if (arr.length > 3) {
                    index *= arr[i];
                } else {
                    console.log("Ошибка");
                }
            }
            return index;
        }
